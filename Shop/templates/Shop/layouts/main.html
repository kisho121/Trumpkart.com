{% load static %}
<!doctype html>
<html lang="en">
  <head>
   
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google-site-verification" content="9mfEoQ0CsPIO4Hrqo0H0787cQ__z3I4ENlSyJ25StKg" />
   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    
    <title>
        {% block title %} 
        {% endblock title %}
    </title>

    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">

   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preload"
          href="{% static 'fontawesome/css/all.min.css' %}"
          as="style"
          onload="this.onload=null;this.rel='stylesheet'">

    <noscript>
      <link rel="stylesheet" href="{% static 'fontawesome/css/all.min.css' %}">
    </noscript>


    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">


  </head>
  <body class="bg-body .poppins-regular">
    {% include 'Shop/inc/navbar.html' %}
    {% block content %}
    {% endblock content %}
    {% include 'Shop/inc/footer.html' %}
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

   <!-- Global Loader -->
    <div id="page-loader">
      <div class="spinner-border text-light" role="status"></div>
    </div>
    {% block scripts %}
      <script>
          const loader = document.getElementById("page-loader");

          /* show loader ONLY for real navigation links */
          document.querySelectorAll("a.show-loader").forEach(link => {
            link.addEventListener("click", () => {
              loader.style.display = "flex";
            });
          });

          /* show loader on form submit (keep this ✔) */
          document.addEventListener("submit", function () {
            loader.style.display = "flex";
          });

          /* always hide loader when page loads or comes back */
          window.addEventListener("pageshow", function () {
            loader.style.display = "none";
          });

      </script>
    {% endblock scripts %}
    
  </body>
</html>
