{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="google-site-verification" content="9mfEoQ0CsPIO4Hrqo0H0787cQ__z3I4ENlSyJ25StKg" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>{% block title %}{% endblock title %}</title>

    <!-- ============================================ -->
    <!-- PWA META TAGS -->
    <!-- ============================================ -->
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="TrumpKart">
    <meta name="application-name" content="TrumpKart">
    <link rel="apple-touch-icon" sizes="192x192" href="/static/images/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="/static/images/icon-512.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="preload"
          href="{% static 'fontawesome/css/all.min.css' %}"
          as="style"
          onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link rel="stylesheet" href="{% static 'fontawesome/css/all.min.css' %}">
    </noscript>

    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">

    <!-- ============================================ -->
    <!-- PWA INSTALL BANNER STYLES -->
    <!-- ============================================ -->
    <style>
        #pwa-install-banner {
            position: fixed;
            bottom: -200px;
            left: 0;
            right: 0;
            width: 100%;
            background: linear-gradient(135deg, #1a1a1a, #2d2d2d);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 -6px 30px rgba(0, 0, 0, 0.4);
            z-index: 99999;
            transition: bottom 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            padding: 12px 14px;
            max-height: 100px;
        }

        #pwa-install-banner.show {
            bottom: 0;
        }

        .pwa-banner-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: space-between;
        }

        .pwa-banner-icon img {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .pwa-banner-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
            overflow: hidden;
        }

        .pwa-banner-text strong {
            color: #fff;
            font-size: 0.9rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pwa-banner-text span {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.75rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pwa-banner-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .pwa-btn-install {
            padding: 8px 20px;
            background: #000;
            border: 1px solid #fff;
            border-radius: 50px;
            color: #fff;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .pwa-btn-install:hover {
            background: #fff;
            color: #000;
        }

        .pwa-btn-dismiss {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            padding: 5px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .pwa-btn-dismiss:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
        }

        .pwa-btn-dismiss svg {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 480px) {
            #pwa-install-banner { padding: 10px 12px; }
            .pwa-banner-icon img { width: 38px; height: 38px; }
            .pwa-banner-text strong { font-size: 0.82rem; }
            .pwa-banner-text span { font-size: 0.7rem; }
            .pwa-btn-install { padding: 7px 16px; font-size: 0.75rem; }
        }

        @media (max-width: 360px) {
            .pwa-banner-text span { display: none; }
            .pwa-btn-install { padding: 6px 14px; font-size: 0.72rem; }
        }

        @media (max-height: 450px) and (orientation: landscape) {
            .pwa-banner-text span { display: none; }
            .pwa-banner-icon img { width: 32px; height: 32px; }
        }
    </style>
  </head>

  <body class="bg-body .poppins-regular">
    {% include 'Shop/inc/navbar.html' %}

    {% block content %}
    {% endblock content %}

    {% include 'Shop/inc/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <!-- Global Loader -->
    <div id="page-loader">
      <div class="spinner-border text-light" role="status"></div>
    </div>

    {% block scripts %}
    <script>
        // ── Page Loader ──────────────────────────────────────────
        const loader = document.getElementById("page-loader");

        document.querySelectorAll("a.show-loader").forEach(link => {
            link.addEventListener("click", () => {
                loader.style.display = "flex";
            });
        });

        document.addEventListener("submit", function () {
            loader.style.display = "flex";
        });

        window.addEventListener("pageshow", function () {
            loader.style.display = "none";
        });
    </script>
    {% endblock scripts %}

    <!-- ============================================ -->
    <!-- PWA SERVICE WORKER + INSTALL BANNER -->
    <!-- ============================================ -->
    <script>
        // ── Service Worker ───────────────────────────────────────
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.register('/sw.js', { scope: '/' })
                    .then(function (registration) {
                        console.log('[TrumpKart PWA] SW registered:', registration.scope);
                        setInterval(function () {
                            registration.update();
                        }, 60 * 60 * 1000);
                    })
                    .catch(function (error) {
                        console.error('[TrumpKart PWA] SW failed:', error);
                    });
            });
        }

        // ── Install Prompt ───────────────────────────────────────
        var deferredPrompt = null;
        var bannerShown = false;

        const isIos = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
        const isAndroid = /android/i.test(navigator.userAgent);
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
                            || window.navigator.standalone === true;

        window.addEventListener('beforeinstallprompt', function (event) {
            event.preventDefault();
            deferredPrompt = event;
            console.log('[TrumpKart PWA] beforeinstallprompt fired!');
            if (!bannerShown) {
                bannerShown = true;
                showInstallBanner('android');
            }
        });

        // ── Show for iOS automatically ───────────────────────────
        if (isIos && !isStandalone && !sessionStorage.getItem('pwa-banner-dismissed')) {
            showInstallBanner('ios');
        }

        function showInstallBanner(type) {
            if (sessionStorage.getItem('pwa-banner-dismissed')) return;
            if (isStandalone) return;

            if (!document.getElementById('pwa-install-banner')) {
                var banner = document.createElement('div');
                banner.id = 'pwa-install-banner';

                var subtitle = type === 'ios' 
                    ? '📲 Tap Share → Add to Home Screen'
                    : 'Faster access & better experience!';

                var installBtnHtml = type === 'ios'
                    ? '' // iOS can't trigger install programmatically
                    : '<button class="pwa-btn-install" onclick="installPWA()">Install</button>';

                banner.innerHTML = `
                    <div class="pwa-banner-content">
                        <div class="pwa-banner-icon">
                            <img src="/static/images/icon-192.png" alt="TrumpKart">
                        </div>
                        <div class="pwa-banner-text">
                            <strong>Install TrumpKart App</strong>
                            <span>${subtitle}</span>
                        </div>
                        <div class="pwa-banner-actions">
                            ${installBtnHtml}
                            <button class="pwa-btn-dismiss" onclick="dismissInstallBanner()" aria-label="Dismiss">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <line x1="18" y1="6" x2="6" y2="18"/>
                                    <line x1="6" y1="6" x2="18" y2="18"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
                document.body.appendChild(banner);
            }

            setTimeout(function () {
                var el = document.getElementById('pwa-install-banner');
                if (el) el.classList.add('show');
            }, 3000);
        }

        function installPWA() {
            if (!deferredPrompt) return;
            dismissInstallBanner();
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(function (outcome) {
                console.log('[TrumpKart PWA] Install outcome:', outcome.outcome);
                deferredPrompt = null;
            });
        }

        function dismissInstallBanner() {
            var el = document.getElementById('pwa-install-banner');
            if (el) {
                el.classList.remove('show');
                setTimeout(function () {
                    if (el.parentNode) el.parentNode.removeChild(el);
                }, 400);
            }
            sessionStorage.setItem('pwa-banner-dismissed', 'true');
        }

        window.addEventListener('appinstalled', function () {
            console.log('[TrumpKart PWA] Installed!');
            dismissInstallBanner();
            deferredPrompt = null;
        });
    </script>

  </body>
</html>
